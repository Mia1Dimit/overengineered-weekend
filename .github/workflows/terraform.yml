name: Terraform

on:
  push:
    branches:
      - main
  pull_request:

env:
  TF_VERSION: "1.8.5"
  AWS_REGION: "eu-west-1"
  PROJECT_NAME: overengineered-weekend
  TF_WORKING_DIR: infra

jobs:
  terraform:
    name: Plan ${{ github.ref == 'refs/heads/main' && '+ Apply' || 'only' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_TOKEN_your_registry_hostname: ${{ secrets.TF_REGISTRY_TOKEN }}

      - name: Verify AWS Credentials
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "❌ ERROR: AWS_ACCESS_KEY_ID secret is not set!"
            echo "Please add it to Settings → Secrets and variables → Actions"
            exit 1
          fi
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "❌ ERROR: AWS_SECRET_ACCESS_KEY secret is not set!"
            echo "Please add it to Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ AWS credentials are configured"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set environment
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tfvars=../environments/prod.tfvars" >> $GITHUB_OUTPUT
            echo "env_name=prod" >> $GITHUB_OUTPUT
          else
            echo "tfvars=../environments/dev.tfvars" >> $GITHUB_OUTPUT
            echo "env_name=dev" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          echo "🔐 Initializing Terraform with S3 backend..."
          echo "Region: $AWS_REGION"
          terraform init \
            -backend-config="key=${{ env.PROJECT_NAME }}/${{ steps.env.outputs.env_name }}/terraform.tfstate"
          echo "✅ Terraform initialized successfully"

      - name: Terraform Format check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var-file="${{ steps.env.outputs.tfvars }}" \
            -out=tfplan \
            -no-color 2>&1 | tee tfplan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planFile = '${{ env.TF_WORKING_DIR }}/tfplan.txt';
            let plan = 'Plan file not found';
            if (fs.existsSync(planFile)) {
              plan = fs.readFileSync(planFile, 'utf8').slice(0, 65000);
            }
            const body = `### Terraform Plan — \`${{ steps.env.outputs.env_name }}\`
            \`\`\`hcl
            ${plan}
            \`\`\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan
